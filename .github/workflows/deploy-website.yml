name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # JOB: SYNC DOCUMENTATION
  #
  # Deterministic script that updates website documentation files:
  #   - Version references (package.json → website files)
  #   - Field type / component type counts (source → website files)
  #   - Schema file copies (schemas/{version}/ → website/assets/schemas/)
  #
  # Only runs on workflow_dispatch (not on push triggers).
  # Non-blocking: build + deploy proceed even if this job fails or is skipped.
  # ===========================================================================
  sync-docs:
    name: Sync Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT_WORKFLOW }}
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync website documentation
        run: bun run scripts/sync-website-docs.ts

      - name: Commit and push changes
        run: |
          git diff --quiet website/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(jq -r '.version' package.json)
          git add website/
          git commit -m "docs: sync website documentation for v${VERSION} [skip ci]"
          git push origin main

  build:
    name: Build Website
    runs-on: ubuntu-latest
    needs: [sync-docs]
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun website:build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled() && needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
