name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # JOB: SYNC DOCUMENTATION
  #
  # Uses Claude Code to update website documentation files that may contain
  # stale counts or version refs:
  #   - website/assets/llms.txt          (LLM quick reference)
  #   - website/assets/llms-full.txt     (complete LLM schema docs)
  #   - website/pages/docs/               (interactive docs pages)
  #   - website/components/docs-components.ts (docs reusable components)
  #   - website/assets/schemas/           (JSON Schema served at /schemas/)
  #
  # Only runs on workflow_dispatch (not on push triggers).
  # Non-blocking: build + deploy proceed even if this job fails or is skipped.
  # ===========================================================================
  sync-docs:
    name: Sync Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT_WORKFLOW }}
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get current version
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Sync documentation with Claude Code
        id: sync
        uses: anthropics/claude-code-action@v1
        timeout-minutes: 15
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: false
          use_sticky_comment: false
          claude_args: "--max-turns 30 --model claude-opus-4-6 --max-budget-usd 10.00"
          prompt: |
            You are updating website documentation for Sovrium v${{ steps.version.outputs.version }}.

            You are acting as a website-editor agent. You ONLY modify files in the `website/` folder.
            You follow the Sovrium coding standards: no semicolons, single quotes, 100-char line width,
            2-space indent, trailing commas, one attribute per line in JSX.

            ## Source of Truth

            Read these files to get the ACTUAL counts and types:

            1. `src/domain/models/app/table/fields.ts` — Count the imported field type schemas (lines 10-50).
               Each import like `XxxFieldSchema` = 1 field type. Currently 41 field types (39 named + date covers 3 values).
            2. `src/domain/models/app/page/sections.ts` — Count the `Schema.Literal(...)` values (lines 27-89).
               Each string literal = 1 component type. Currently 62 component types.
            3. `src/domain/models/app/index.ts` — Count root AppSchema properties (name, version, tables, theme, etc.).
            4. `schemas/${{ steps.version.outputs.version }}/app.schema.json` — The generated JSON Schema for this version.

            ## Files to Update

            Update ONLY files in `website/`:

            ### 1. `website/assets/llms.txt`
            - Update version number references to v${{ steps.version.outputs.version }}
            - Update field type count to match actual count from `fields.ts`
            - Update component type count to match actual count from `sections.ts`
            - Update JSON Schema URL to point to the new version

            ### 2. `website/assets/llms-full.txt`
            - Update version number references to v${{ steps.version.outputs.version }}
            - Update field type count and component type count
            - Update JSON Schema URL
            - Verify every field type from `fields.ts` is documented — add any NEW types, remove any DELETED types
            - Verify every component type from `sections.ts` is documented — add any NEW types, remove any DELETED types

            ### 3. `website/pages/docs/`
            - Update version number references to v${{ steps.version.outputs.version }}
            - Update field type count and component type count in the UI text
            - Update JSON Schema URL
            - Verify badge lists match actual types from source of truth — add/remove as needed

            ### 4. `website/components/docs-components.ts` (if needed)
            - If docs components reference version numbers or counts, update them too

            ### 5. `website/assets/schemas/${{ steps.version.outputs.version }}/app.schema.json`
            - Copy the generated JSON Schema from `schemas/${{ steps.version.outputs.version }}/app.schema.json`
              to `website/assets/schemas/${{ steps.version.outputs.version }}/app.schema.json`
            - This makes the schema publicly available at `https://sovrium.com/schemas/<version>/app.schema.json`
            - Create the directory if it does not exist: `mkdir -p website/assets/schemas/${{ steps.version.outputs.version }}`

            ## Rules

            - NEVER modify files outside `website/` — source code in `src/` is read-only for you
            - After making changes, run `bun run typecheck` and `bun run format` to validate
            - If NO changes are needed (counts and versions already match), do nothing and skip committing
            - If changes are needed, stage ONLY `website/` files, commit with message:
              `docs: sync website documentation for v${{ steps.version.outputs.version }} [skip ci]`
            - Push the commit to main directly
            - Use `git add website/` to stage — never `git add .` or `git add -A`

  build:
    name: Build Website
    runs-on: ubuntu-latest
    needs: [sync-docs]
    if: always() && !cancelled()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build website
        run: bun website:build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled() && needs.build.result == 'success'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
