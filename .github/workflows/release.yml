name: Publish to npm

# Triggered when Forgejo mirrors a release tag to GitHub
on:
  push:
    tags:
      - 'v*'

# Prevent parallel publishes
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: npm Publish (Trusted Publishing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build for npm
        run: bun run build

      - name: Pre-publish validation
        run: bun run prepublish-check

      - name: Patch repository URL for provenance
        run: |
          # npm provenance requires repository.url to match the GitHub source.
          # Our package.json points to Forgejo (primary repo), but npm validates
          # against the GitHub Actions build context. Patch it for publishing.
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            pkg.repository.url = 'git+https://github.com/sovrium/sovrium.git';
            if (pkg.bugs) pkg.bugs.url = 'https://github.com/sovrium/sovrium/issues';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          # Extract changelog from CHANGELOG.md for this version
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## ${VERSION}/,/^## [0-9]/" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "$NOTES" \
            --verify-tag
