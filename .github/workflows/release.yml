name: Release

on:
  workflow_run:
    workflows: ['Test']
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pre-publish validation
        run: bun run prepublish-check

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Read version
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.version.outputs.version }}" --title "v${{ steps.version.outputs.version }}" --generate-notes --verify-tag

  # Trigger website sync + deploy after successful release.
  # The sync-docs job (Claude Code) now lives in deploy-website.yml and runs
  # only on workflow_dispatch. Non-blocking: release succeeds even if this fails.
  trigger-website-sync:
    name: Trigger Website Sync
    needs: publish
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Dispatch website deploy with doc sync
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOW }}
        run: |
          echo "Triggering website deploy with documentation sync..."
          gh workflow run deploy-website.yml --ref main
          echo "Website deploy workflow dispatched"
