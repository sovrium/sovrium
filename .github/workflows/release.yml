name: Release

on:
  workflow_run:
    workflows: ['Test']
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]') &&
      startsWith(github.event.workflow_run.head_commit.message, 'release:')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT_WORKFLOW }}
        run: bunx semantic-release

  # Trigger website sync + deploy after successful release.
  # The sync-docs job (Claude Code) now lives in deploy-website.yml and runs
  # only on workflow_dispatch. Non-blocking: release succeeds even if this fails.
  trigger-website-sync:
    name: Trigger Website Sync
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Dispatch website deploy with doc sync
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOW }}
        run: |
          echo "Triggering website deploy with documentation sync..."
          gh workflow run deploy-website.yml --ref main
          echo "Website deploy workflow dispatched"
