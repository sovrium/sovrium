name: Release

# Triggered when Forgejo mirrors a release tag to GitHub
on:
  push:
    tags:
      - 'v*'

# Prevent parallel releases
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ── Create GitHub Release (entry point for all other jobs) ───
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create GitHub Release (draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## ${VERSION}/,/^## [0-9]/" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          # Created as a draft so binary jobs can append .tar.gz assets —
          # immutable releases reject asset uploads once published. The
          # publish-release job flips --draft=false after all assets land.
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes "$NOTES" \
            --verify-tag \
            --draft

  # ── Publish @sovrium/types to npm ──────────────────────────
  # Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
  # npm is configured to trust this repo + workflow file (release.yml).
  # Provenance attestation is generated automatically by trusted publishing.
  publish-types:
    name: Publish @sovrium/types
    needs: [release]
    runs-on: ubuntu-latest
    # Optional: gate publish behind a GitHub Actions Environment for an
    # extra approval/protection layer. Configure the environment on the
    # npm Trusted Publisher form too if you enable this.
    # environment: npm-publish
    permissions:
      contents: read
      id-token: write # Required: lets GitHub Actions mint the OIDC token npm verifies
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 LTS ships npm 10.x; trusted publishing requires npm >= 11.5.1.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @sovrium/types
        run: bun run build:types

      - name: Patch repository URL for provenance
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('packages/types/package.json', 'utf8'));
            if (!pkg.repository) pkg.repository = {};
            if (typeof pkg.repository === 'object') {
              pkg.repository.url = 'git+https://github.com/sovrium/sovrium.git';
            }
            require('fs').writeFileSync('packages/types/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # No NODE_AUTH_TOKEN: trusted publishing authenticates via the OIDC
      # token. --provenance is omitted because trusted publishing implies it.
      # `--tag latest` is explicit because the v1.0.0 → v0.7.0 rollback left
      # npm's `latest` dist-tag pinned to the higher (dead) version, and npm
      # refuses implicit-`latest` assignment when the new version is lower.
      # Drop the flag once project version is again > 1.0.0.
      - name: Publish @sovrium/types to npm
        run: cd packages/types && npm publish --access public --tag latest

  # ── Build macOS binaries on native runners ──────────────────
  build-binary-macos:
    name: Build macOS Binaries
    needs: [release]
    # Both darwin arches build on ONE Apple-Silicon runner: arm64 native, x64
    # cross-compiled via `bun build --target=bun-darwin-x64`. This removes the
    # dependency on the retired Intel `macos-13` runner, which left the
    # darwin-x64 job stuck in queue indefinitely and blocked every release
    # (the publish gate needs all 5 platform assets present).
    runs-on: macos-14
    # Cap runtime so a wedged GitHub macOS runner cannot hang the run and hold
    # the `concurrency: release` lock indefinitely.
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binaries (arm64 native + x64 cross-compile)
        run: |
          bun run build:binary -- --target darwin-arm64
          bun run build:binary -- --target darwin-x64

      - name: Ad-hoc code sign (macOS)
        run: |
          codesign --force --sign - sovrium-darwin-arm64
          codesign --force --sign - sovrium-darwin-x64

      # Release gate for issue #19: the compiled binary must serve theme-aware
      # CSS without the native lightningcss/oxide addons. Smoke-test the native
      # arm64 build — the x64 binary is the same source cross-compiled, so this
      # exercises the identical CSS pipeline code path. A failure blocks the
      # release (publish jobs depend on this job succeeding).
      - name: Smoke test - binary serves compiled CSS
        env:
          # Smoke test validates the CSS pipeline only; the binary is
          # secure-by-default and refuses to boot without an encryption key.
          # Opt into the deterministic dev key so boot reaches the CSS route.
          SOVRIUM_ALLOW_DEV_KEY: '1'
        run: |
          PORT=3210 ./sovrium-darwin-arm64 start examples/landing-page/app.yaml &
          SERVER_PID=$!
          CSS=""
          for _ in $(seq 1 30); do
            CSS=$(curl -sf "http://localhost:3210/assets/output.css" || true)
            [ -n "$CSS" ] && break
            sleep 1
          done
          kill "$SERVER_PID" 2>/dev/null || true
          if [ -z "$CSS" ]; then
            echo "FAIL: binary did not serve /assets/output.css (CSS pipeline crashed - see issue #19)"
            exit 1
          fi
          if ! echo "$CSS" | grep -q '@layer'; then
            echo "FAIL: binary served no Tailwind CSS (@layer missing)"
            exit 1
          fi
          if echo "$CSS" | grep -qi 'compilation failed'; then
            echo "FAIL: binary CSS compilation failed"
            exit 1
          fi
          echo "OK: binary served $(printf '%s' "$CSS" | wc -c) bytes of compiled CSS"

      - name: Package, checksum, and upload both arches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          for TARGET in darwin-arm64 darwin-x64; do
            # Tar a bare `sovrium` so every platform's tarball shares the same
            # inner name (matches the Linux rename + the Homebrew formula's
            # `bin.install "sovrium"`).
            cp "sovrium-${TARGET}" sovrium
            tar czf "sovrium-${VERSION}-${TARGET}.tar.gz" sovrium
            shasum -a 256 "sovrium-${VERSION}-${TARGET}.tar.gz" > "sovrium-${VERSION}-${TARGET}.sha256"
            rm -f sovrium
            gh release upload "${TAG}" \
              "sovrium-${VERSION}-${TARGET}.tar.gz" \
              "sovrium-${VERSION}-${TARGET}.sha256" \
              --clobber
          done

  # ── Build Linux binaries (cross-compile on ubuntu) ──────────
  build-binary-linux:
    name: Build Linux Binary (${{ matrix.target }})
    needs: [release]
    strategy:
      matrix:
        include:
          - target: linux-x64
          - target: linux-arm64
    runs-on: ubuntu-latest
    # Cap runtime so a wedged runner cannot hang the run and hold the
    # `concurrency: release` lock indefinitely.
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: bun run build:binary -- --target ${{ matrix.target }}

      # Release gate for issue #19: verify the compiled binary serves CSS
      # without native addons. Runs only for linux-x64, the one target the
      # x64 ubuntu runner can execute (linux-arm64 is cross-compiled).
      - name: Smoke test - binary serves compiled CSS
        if: matrix.target == 'linux-x64'
        env:
          # Smoke test validates the CSS pipeline only; the binary is
          # secure-by-default and refuses to boot without an encryption key.
          # Opt into the deterministic dev key so boot reaches the CSS route.
          SOVRIUM_ALLOW_DEV_KEY: '1'
        run: |
          PORT=3210 ./sovrium-linux-x64 start examples/landing-page/app.yaml &
          SERVER_PID=$!
          CSS=""
          for _ in $(seq 1 30); do
            CSS=$(curl -sf "http://localhost:3210/assets/output.css" || true)
            [ -n "$CSS" ] && break
            sleep 1
          done
          kill "$SERVER_PID" 2>/dev/null || true
          if [ -z "$CSS" ]; then
            echo "FAIL: binary did not serve /assets/output.css (CSS pipeline crashed - see issue #19)"
            exit 1
          fi
          if ! echo "$CSS" | grep -q '@layer'; then
            echo "FAIL: binary served no Tailwind CSS (@layer missing)"
            exit 1
          fi
          if echo "$CSS" | grep -qi 'compilation failed'; then
            echo "FAIL: binary CSS compilation failed"
            exit 1
          fi
          echo "OK: binary served $(printf '%s' "$CSS" | wc -c) bytes of compiled CSS"

      - name: Package binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Rename to the bare `sovrium` so the tarball matches the macOS layout.
          # The Homebrew formula (`bin.install "sovrium"`), the curl installer, and
          # the `sovrium update` self-replace extractor all expect the bare name.
          mv "sovrium-${{ matrix.target }}" sovrium
          tar czf "sovrium-${VERSION}-${{ matrix.target }}.tar.gz" sovrium

      - name: Generate checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sha256sum "sovrium-${VERSION}-${{ matrix.target }}.tar.gz" > "sovrium-${VERSION}-${{ matrix.target }}.sha256"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "${TAG}" \
            "sovrium-${VERSION}-${{ matrix.target }}.tar.gz" \
            "sovrium-${VERSION}-${{ matrix.target }}.sha256" \
            --clobber

  # ── Build Windows binary (cross-compile on ubuntu) ──────────
  build-binary-windows:
    name: Build Windows Binary
    needs: [release]
    runs-on: ubuntu-latest
    # Cap runtime so a wedged runner cannot hang the run and hold the
    # `concurrency: release` lock indefinitely.
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: bun run build:binary -- --target windows-x64

      - name: Package binary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          zip "sovrium-${VERSION}-windows-x64.zip" "sovrium-windows-x64.exe"

      - name: Generate checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sha256sum "sovrium-${VERSION}-windows-x64.zip" > "sovrium-${VERSION}-windows-x64.sha256"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "${TAG}" \
            "sovrium-${VERSION}-windows-x64.zip" \
            "sovrium-${VERSION}-windows-x64.sha256" \
            --clobber

  # ── Aggregate checksums after all binaries are built ────────
  aggregate-checksums:
    name: Aggregate Checksums
    needs: [build-binary-macos, build-binary-linux, build-binary-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Read version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all checksum files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          for TARGET in darwin-x64 darwin-arm64 linux-x64 linux-arm64 windows-x64; do
            gh release download "${TAG}" \
              --repo "${{ github.repository }}" \
              --pattern "sovrium-${VERSION}-${TARGET}.sha256" \
              --clobber || true
          done

      - name: Create combined checksums file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat sovrium-${VERSION}-*.sha256 > "sovrium-${VERSION}-checksums.txt" 2>/dev/null || true
          if [ -s "sovrium-${VERSION}-checksums.txt" ]; then
            echo "Combined checksums:"
            cat "sovrium-${VERSION}-checksums.txt"
          else
            echo "No checksums found to aggregate"
            exit 0
          fi

      - name: Upload combined checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ -s "sovrium-${VERSION}-checksums.txt" ]; then
            gh release upload "${TAG}" \
              "sovrium-${VERSION}-checksums.txt" \
              --repo "${{ github.repository }}" \
              --clobber
          fi

  # ── Update Homebrew tap formula ─────────────────────────────
  # Depends on publish-release: update-homebrew-formula.ts fetches each
  # binary's .sha256 over plain HTTPS, and GitHub serves 404 on public
  # download URLs while a release is still a draft. By the time we run,
  # publish-release has flipped --draft=false so the URLs are servable.
  update-homebrew:
    name: Update Homebrew Formula
    needs: [publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sovrium repo
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bun run scripts/build/update-homebrew-formula.ts \
            --version "${VERSION}" \
            --output sovrium.rb

      - name: Verify tap token is configured
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set — cannot push to sovrium/homebrew-tap. Configure it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout homebrew-tap repo
        uses: actions/checkout@v5
        with:
          repository: sovrium/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p homebrew-tap/Formula
          cp sovrium.rb homebrew-tap/Formula/sovrium.rb

          cd homebrew-tap
          git config user.name "Sovrium CI"
          git config user.email "ci@sovrium.com"
          git add Formula/sovrium.rb
          git diff --cached --quiet && echo "No changes to formula" && exit 0
          git commit -m "sovrium ${VERSION}"
          git push

  # ── Update Scoop bucket for Windows ─────────────────────────
  # See update-homebrew for the publish-release dependency rationale.
  update-scoop:
    name: Update Scoop Manifest
    needs: [publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sovrium repo
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate Scoop manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bun run scripts/build/update-scoop-manifest.ts \
            --version "${VERSION}" \
            --output sovrium.json

      - name: Verify tap token is configured
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set — cannot push to sovrium/scoop-bucket. Configure it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout scoop-bucket repo
        uses: actions/checkout@v5
        with:
          repository: sovrium/scoop-bucket
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: scoop-bucket

      - name: Update manifest and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p scoop-bucket/bucket
          cp sovrium.json scoop-bucket/bucket/sovrium.json

          cd scoop-bucket
          git config user.name "Sovrium CI"
          git config user.email "ci@sovrium.com"
          git add bucket/sovrium.json
          git diff --cached --quiet && echo "No changes to manifest" && exit 0
          git commit -m "sovrium ${VERSION}"
          git push

  # ── Build and push multi-arch Docker image ──────────────────
  build-docker:
    name: Build Docker Image
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Linux binaries for Docker
        run: |
          bun run build:binary -- --target linux-x64
          bun run build:binary -- --target linux-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  # ── Publish the draft release once all assets are present ───
  # The release job creates a DRAFT so binary jobs can append assets
  # (immutable releases reject uploads to a published release). This job
  # verifies all 5 platform archives uploaded, then flips the draft to
  # published. If any archive is missing it exits without publishing,
  # leaving a recoverable draft. Homebrew/Scoop are best-effort tap pushes
  # and must NOT gate publication — hence `if: always()`.
  publish-release:
    name: Publish GitHub Release
    # Runs as soon as all binary archives + the aggregate checksums file
    # are uploaded so the release is non-draft *before* update-homebrew /
    # update-scoop fire — those jobs fetch .sha256 assets over plain HTTPS
    # and GitHub serves 404 on draft assets to unauthenticated clients.
    needs:
      - build-binary-macos
      - build-binary-linux
      - build-binary-windows
      - aggregate-checksums
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all binary assets present
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REQUIRED=(
            "sovrium-${VERSION}-darwin-x64.tar.gz"
            "sovrium-${VERSION}-darwin-arm64.tar.gz"
            "sovrium-${VERSION}-linux-x64.tar.gz"
            "sovrium-${VERSION}-linux-arm64.tar.gz"
            "sovrium-${VERSION}-windows-x64.zip"
          )
          ASSETS=$(gh release view "${TAG}" \
            --repo "${{ github.repository }}" \
            --json assets \
            --jq '.assets[].name')
          MISSING=0
          for ASSET in "${REQUIRED[@]}"; do
            if ! echo "${ASSETS}" | grep -qxF "${ASSET}"; then
              echo "MISSING: ${ASSET}"
              MISSING=1
            fi
          done
          if [ "${MISSING}" -ne 0 ]; then
            echo "FAIL: one or more binary archives are missing — release stays a recoverable draft"
            exit 1
          fi
          echo "OK: all 5 platform archives present"

      - name: Publish release (un-draft)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release edit "${TAG}" \
            --repo "${{ github.repository }}" \
            --draft=false
