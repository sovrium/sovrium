id: 4
name: tasks
fields:
  - id: 1
    name: title
    type: single-line-text
    required: true
  - id: 2
    name: deal
    type: relationship
    relatedTable: deals
    relationType: many-to-one
  - id: 3
    name: due_date
    type: date
  - id: 4
    name: status
    type: status
    options:
      - value: Todo
        color: '#94A3B8'
      - value: Doing
        color: '#3B82F6'
      - value: Done
        color: '#10B981'
    default: Todo
  - id: 5
    name: done
    type: checkbox
    default: false
  - id: 6
    name: priority
    type: single-select
    options:
      - Low
      - Medium
      - High
    default: Medium
  - id: 7
    name: created_by
    type: created-by

aiAccess:
  description: >-
    Follow-up tasks linked to deals. Use this when the user asks about to-dos,
    due dates, overdue work, or task status.
  operations:
    - read
    - list
    - create
    - update
  fieldExposure: permissioned

permissions:
  read: authenticated
  create:
    - admin
    - member
  update:
    - admin
    - member
  delete:
    - admin
