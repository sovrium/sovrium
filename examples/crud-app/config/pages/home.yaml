name: home
path: /
access:
  require: authenticated
  redirectTo: /sign-in
meta:
  title: CRM Dashboard
  description: Manage your contacts and companies
components:
  - type: container
    element: section
    props:
      className: py-12 px-6
      style:
        backgroundColor: '#f8fafc'
    children:
      - type: container
        props:
          className: max-w-5xl mx-auto
        children:
          - type: text
            element: h1
            props:
              className: text-4xl font-bold mb-4
              style:
                color: '#0f172a'
            content: CRM Dashboard
          - type: text
            element: p
            props:
              className: text-lg mb-8
              style:
                color: '#475569'
            content: Manage your contacts and companies in one place.
          - type: container
            props:
              style:
                display: grid
                gridTemplateColumns: repeat(auto-fit, minmax(250px, 1fr))
                gap: 1.5rem
            children:
              - type: container
                props:
                  className: p-6 rounded-xl border
                  style:
                    backgroundColor: '#ffffff'
                    borderColor: '#e2e8f0'
                children:
                  - type: text
                    element: h3
                    props:
                      className: text-lg font-semibold mb-2
                    content: Contacts
                  - type: text
                    element: p
                    props:
                      style:
                        color: '#475569'
                    content: Track leads and manage relationships.
              - type: container
                props:
                  className: p-6 rounded-xl border
                  style:
                    backgroundColor: '#ffffff'
                    borderColor: '#e2e8f0'
                children:
                  - type: text
                    element: h3
                    props:
                      className: text-lg font-semibold mb-2
                    content: Companies
                  - type: text
                    element: p
                    props:
                      style:
                        color: '#475569'
                    content: Organize accounts by company.
