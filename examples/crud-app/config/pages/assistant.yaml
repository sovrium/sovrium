name: assistant
path: /assistant
access:
  require: authenticated
  redirectTo: /sign-in
meta:
  title: Assistant
  description: Create, edit, and review records with AI
components:
  - $ref: ./_nav.yaml
  - type: container
    element: section
    props:
      className: max-w-3xl mx-auto px-6 py-8
    children:
      - type: text
        element: h1
        props:
          className: text-2xl font-bold mb-1
        content: Workspace Assistant
      - type: text
        element: p
        props:
          className: text-sm mb-6
        content: >-
          Ask the assistant to add a company, update a deal's stage, or review
          your pipeline for missing data and overdue tasks.

      - type: ai-chat
        agent: records-assistant
        placeholder: e.g. "Add a deal for Acme worth $20k in Proposal" or "Review overdue tasks"
        showHistory: true
        chatHeight: 520
