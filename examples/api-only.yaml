name: task-api
version: 1.0.0
description: Headless API for task management

auth:
  strategies:
    - type: emailAndPassword

tables:
  - id: 1
    name: projects
    fields:
      - id: 1
        name: name
        type: single-line-text
        required: true
      - id: 2
        name: description
        type: long-text
      - id: 3
        name: status
        type: single-select
        options:
          - Planning
          - Active
          - Completed
          - Archived
      - id: 4
        name: created_by
        type: created-by

  - id: 2
    name: tasks
    fields:
      - id: 1
        name: title
        type: single-line-text
        required: true
      - id: 2
        name: description
        type: long-text
      - id: 3
        name: project
        type: relationship
        relatedTable: projects
        relationType: many-to-one
      - id: 4
        name: priority
        type: single-select
        options:
          - Low
          - Medium
          - High
          - Critical
      - id: 5
        name: done
        type: checkbox
      - id: 6
        name: due_date
        type: date
      - id: 7
        name: assigned_to
        type: user
