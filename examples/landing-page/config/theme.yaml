colors:
  primary: '#3b82f6'
  primary-hover: '#2563eb'
  primary-light: '#dbeafe'
  secondary: '#7c3aed'
  secondary-light: '#ede9fe'
  background: '#ffffff'
  background-alt: '#f8fafc'
  text: '#0f172a'
  text-secondary: '#475569'
  text-muted: '#64748b'
  border: '#e2e8f0'
  gray-50: '#f8fafc'
  gray-100: '#f1f5f9'
  gray-200: '#e2e8f0'
  gray-300: '#cbd5e1'
  gray-400: '#94a3b8'
  gray-500: '#64748b'
  gray-600: '#475569'
  gray-700: '#334155'
  gray-800: '#1e293b'
  gray-900: '#111827'
  success: '#10b981'
  warning: '#f59e0b'
  error: '#ef4444'
fonts:
  sans:
    family: Inter
    fallback: system-ui, -apple-system, sans-serif
    weights: [400, 500, 600, 700]
    size: 16px
    lineHeight: '1.6'
  heading:
    family: Inter
    fallback: system-ui, -apple-system, sans-serif
    weights: [600, 700, 800]
    size: 48px
    lineHeight: '1.1'
    letterSpacing: '-0.02em'
borderRadius:
  sm: 0.25rem
  md: 0.5rem
  lg: 0.75rem
  xl: 1rem
  full: 9999px
shadows:
  sm: 0 1px 2px 0 rgb(0 0 0 / 0.05)
  md: 0 4px 6px -1px rgb(0 0 0 / 0.1)
  lg: 0 10px 15px -3px rgb(0 0 0 / 0.1)
  xl: 0 20px 25px -5px rgb(0 0 0 / 0.1)
