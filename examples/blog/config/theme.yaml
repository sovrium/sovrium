colors:
  primary: '#7c3aed'
  primary-hover: '#6d28d9'
  background: '#fafaf9'
  surface: '#ffffff'
  text: '#18181b'
  text-secondary: '#52525b'
  text-muted: '#71717a'
  border: '#e4e4e7'
  badge-bg: '#f4f4f5'
fonts:
  sans:
    family: Inter
    fallback: system-ui, -apple-system, sans-serif
    weights: [400, 500, 600, 700]
    size: 16px
    lineHeight: '1.6'
  serif:
    family: Lora
    fallback: Georgia, 'Times New Roman', serif
    weights: [400, 500, 600, 700]
    size: 19px
    lineHeight: '1.75'
  heading:
    family: Inter
    fallback: system-ui, -apple-system, sans-serif
    weights: [600, 700, 800]
    size: 48px
    lineHeight: '1.15'
    letterSpacing: '-0.02em'
borderRadius:
  sm: 0.25rem
  md: 0.5rem
  lg: 0.75rem
  full: 9999px
