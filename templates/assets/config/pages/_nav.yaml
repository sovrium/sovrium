# Reusable workspace top-nav.
type: container
element: header
props:
  className: border-b
children:
  - type: container
    props:
      className: max-w-6xl mx-auto px-6 py-3 flex items-center justify-between
    children:
      - type: container
        props:
          className: flex items-center gap-6
        children:
          - type: text
            element: span
            props:
              className: text-base font-semibold
            content: Assets
          - type: container
            props:
              className: flex items-center gap-1 text-sm
            children:
              - type: link
                props:
                  href: /
                  className: px-3 py-1.5 rounded-md font-medium
                content: Inventory
              - type: link
                props:
                  href: /gallery
                  className: px-3 py-1.5 rounded-md font-medium
                content: Gallery
              - type: link
                props:
                  href: /board
                  className: px-3 py-1.5 rounded-md font-medium
                content: By status
      - type: button
        props:
          className: px-3 py-1.5 rounded-md border text-sm font-medium
        content: Sign out
        action:
          type: auth
          method: logout
          onSuccess:
            navigate: /sign-in
