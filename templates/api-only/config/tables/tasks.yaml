id: 2
name: tasks
fields:
  - id: 1
    name: title
    type: single-line-text
    required: true
  - id: 2
    name: description
    type: long-text
  - id: 3
    name: project
    type: relationship
    relatedTable: projects
    relationType: many-to-one
  - id: 4
    name: priority
    type: single-select
    options:
      - Low
      - Medium
      - High
      - Critical
  - id: 5
    name: done
    type: checkbox
  - id: 6
    name: due_date
    type: date
  - id: 7
    name: assigned_to
    type: user
