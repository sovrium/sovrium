path: /
name: home
meta:
  lang: en
  title: Sovrium - Build Your Next App
  description: A modern, configuration-driven platform for rapid application development
components:
  # Navigation
  - type: container
    element: nav
    props:
      className: fixed top-0 left-0 right-0 z-50 px-6 py-4
      style:
        backgroundColor: rgba(255, 255, 255, 0.95)
        backdropFilter: blur(8px)
        borderBottom: 1px solid #e2e8f0
    children:
      - type: container
        props:
          className: max-w-7xl mx-auto flex justify-between items-center
        children:
          - type: text
            element: span
            props:
              className: text-xl font-bold
              style:
                color: '#3b82f6'
            content: Sovrium
          - type: container
            props:
              className: flex items-center gap-8
            children:
              - type: link
                props:
                  href: '#home'
                  className: font-medium hover:text-primary transition-colors
                  style:
                    color: '#0f172a'
                content: '$t:nav.home'
              - type: link
                props:
                  href: '#features'
                  className: font-medium hover:text-primary transition-colors
                  style:
                    color: '#0f172a'
                content: '$t:nav.features'
              - type: link
                props:
                  href: '#pricing'
                  className: font-medium hover:text-primary transition-colors
                  style:
                    color: '#0f172a'
                content: '$t:nav.pricing'
              - type: link
                props:
                  href: '#contact'
                  className: font-medium hover:text-primary transition-colors
                  style:
                    color: '#0f172a'
                content: '$t:nav.contact'
              - component: language-switcher

  # Hero Section
  - type: container
    element: section
    props:
      id: home
      className: pt-32 pb-20 px-6
      style:
        background: linear-gradient(to bottom, #f8fafc, #ffffff)
    children:
      - type: container
        props:
          className: max-w-5xl mx-auto
        children:
          - type: container
            props:
              data-component: hero-section
              className: text-center
            children:
              - type: text
                element: span
                props:
                  className: inline-block px-4 py-1.5 rounded-full text-sm font-medium mb-6
                  style:
                    backgroundColor: '#dbeafe'
                    color: '#3b82f6'
                content: '$t:hero.badge'
              - type: text
                element: h1
                props:
                  className: text-5xl font-bold mb-6
                  style:
                    color: '#0f172a'
                content: '$t:hero.title'
              - type: text
                element: p
                props:
                  className: text-xl mb-10 max-w-2xl mx-auto
                  style:
                    color: '#475569'
                content: '$t:hero.subtitle'
              - type: container
                props:
                  className: flex gap-4 justify-center mb-16
                children:
                  - type: button
                    props:
                      className: px-6 py-3 rounded-lg transition-colors font-semibold shadow-lg
                      style:
                        backgroundColor: '#3b82f6'
                        color: '#ffffff'
                    interactions:
                      hover:
                        backgroundColor: '#2563eb'
                    content: '$t:hero.cta.primary'
                  - type: button
                    props:
                      className: px-6 py-3 rounded-lg transition-colors font-semibold
                      style:
                        borderWidth: 2px
                        borderStyle: solid
                        borderColor: '#3b82f6'
                        color: '#3b82f6'
                        backgroundColor: transparent
                    content: '$t:hero.cta.secondary'
              - type: container
                props:
                  className: flex justify-center gap-12 pt-8
                  style:
                    borderTop: 1px solid #e2e8f0
                children:
                  - type: container
                    props:
                      className: text-center
                    children:
                      - type: container
                        props:
                          className: text-3xl font-bold
                          style:
                            color: '#0f172a'
                        content: '2,500+'
                      - type: container
                        props:
                          className: text-sm
                          style:
                            color: '#64748b'
                        content: '$t:hero.stats.apps'
                  - type: container
                    props:
                      className: text-center
                    children:
                      - type: container
                        props:
                          className: text-3xl font-bold
                          style:
                            color: '#0f172a'
                        content: '10,000+'
                      - type: container
                        props:
                          className: text-sm
                          style:
                            color: '#64748b'
                        content: '$t:hero.stats.developers'
                  - type: container
                    props:
                      className: text-center
                    children:
                      - type: container
                        props:
                          className: text-3xl font-bold
                          style:
                            color: '#0f172a'
                        content: '99.9%'
                      - type: container
                        props:
                          className: text-sm
                          style:
                            color: '#64748b'
                        content: '$t:hero.stats.uptime'

  # Features Section
  - type: container
    element: section
    props:
      id: features
      className: py-24 px-6
      style:
        backgroundColor: '#ffffff'
    children:
      - type: container
        props:
          className: max-w-7xl mx-auto
        children:
          - type: container
            props:
              className: text-center mb-16
            children:
              - type: text
                element: span
                props:
                  className: inline-block px-4 py-1.5 rounded-full text-sm font-medium mb-4
                  style:
                    backgroundColor: '#ede9fe'
                    color: '#7c3aed'
                content: Features
              - type: text
                element: h2
                props:
                  className: text-4xl font-bold mb-4
                  style:
                    color: '#0f172a'
                content: '$t:features.title'
              - type: text
                element: p
                props:
                  className: text-xl max-w-2xl mx-auto
                  style:
                    color: '#475569'
                content: '$t:features.subtitle'
          - type: container
            props:
              className: feature-grid
              style:
                display: grid
                gridTemplateColumns: repeat(auto-fit, minmax(280px, 1fr))
                gap: 1.5rem
            children:
              - component: feature-card
                vars:
                  icon: '$t:feature.1.icon'
                  title: '$t:feature.1.title'
                  description: '$t:feature.1.description'
              - component: feature-card
                vars:
                  icon: '$t:feature.2.icon'
                  title: '$t:feature.2.title'
                  description: '$t:feature.2.description'
              - component: feature-card
                vars:
                  icon: '$t:feature.3.icon'
                  title: '$t:feature.3.title'
                  description: '$t:feature.3.description'

  # How It Works Section
  - type: container
    element: section
    props:
      id: how-it-works
      className: py-24 px-6
      style:
        backgroundColor: '#f8fafc'
    children:
      - type: container
        props:
          className: max-w-7xl mx-auto
        children:
          - type: container
            props:
              className: text-center mb-16
            children:
              - type: text
                element: span
                props:
                  className: inline-block px-4 py-1.5 rounded-full text-sm font-medium mb-4
                  style:
                    backgroundColor: '#d1fae5'
                    color: '#059669'
                content: '$t:howItWorks.badge'
              - type: text
                element: h2
                props:
                  className: text-4xl font-bold mb-4
                  style:
                    color: '#0f172a'
                content: '$t:howItWorks.title'
              - type: text
                element: p
                props:
                  className: text-xl
                  style:
                    color: '#475569'
                content: '$t:howItWorks.subtitle'
          - type: container
            props:
              style:
                display: grid
                gridTemplateColumns: repeat(auto-fit, minmax(280px, 1fr))
                gap: 3rem
            children:
              - component: step-card
                vars:
                  number: '$t:step.1.number'
                  title: '$t:step.1.title'
                  description: '$t:step.1.description'
              - component: step-card
                vars:
                  number: '$t:step.2.number'
                  title: '$t:step.2.title'
                  description: '$t:step.2.description'
              - component: step-card
                vars:
                  number: '$t:step.3.number'
                  title: '$t:step.3.title'
                  description: '$t:step.3.description'

  # CTA Section
  - type: container
    element: section
    props:
      id: cta
      className: py-24 px-6
      style:
        backgroundColor: '#3b82f6'
        color: '#ffffff'
    children:
      - type: container
        props:
          className: max-w-4xl mx-auto text-center
        children:
          - type: text
            element: h2
            props:
              className: text-4xl font-bold mb-6
              style:
                color: '#ffffff'
            content: '$t:cta.title'
          - type: text
            element: p
            props:
              className: text-xl mb-10
              style:
                color: rgba(255, 255, 255, 0.9)
            content: '$t:cta.subtitle'
          - type: container
            props:
              className: flex flex-col items-center gap-4
            children:
              - component: cta-button
                vars:
                  label: '$t:cta.button'
              - type: text
                element: p
                props:
                  className: text-sm
                  style:
                    color: rgba(255, 255, 255, 0.8)
                content: '$t:cta.note'

  # Footer Section
  - type: container
    element: section
    props:
      className: py-16 px-6
      style:
        backgroundColor: '#111827'
        color: '#ffffff'
    children:
      - type: container
        props:
          className: max-w-7xl mx-auto
        children:
          - type: container
            props:
              style:
                display: grid
                gridTemplateColumns: repeat(auto-fit, minmax(200px, 1fr))
                gap: 3rem
                paddingBottom: 3rem
                borderBottom: 1px solid #374151
            children:
              # Brand column
              - type: container
                children:
                  - type: container
                    props:
                      className: flex items-center gap-2 mb-4
                    children:
                      - type: text
                        element: span
                        props:
                          className: text-2xl
                        content: '⚡'
                      - type: text
                        element: span
                        props:
                          className: text-xl font-bold
                        content: Sovrium
                  - type: text
                    element: p
                    props:
                      className: text-sm
                      style:
                        color: '#9ca3af'
                    content: Build apps faster with configuration-driven development.

              # Product column
              - type: container
                children:
                  - type: text
                    element: h4
                    props:
                      className: font-semibold mb-4
                    content: '$t:footer.product'
                  - type: container
                    props:
                      className: space-y-2
                    children:
                      - type: container
                        children:
                          - type: link
                            props:
                              href: /features
                              style:
                                color: '#9ca3af'
                            content: Features
                      - type: container
                        children:
                          - type: link
                            props:
                              href: /pricing
                              style:
                                color: '#9ca3af'
                            content: Pricing
                      - type: container
                        children:
                          - type: link
                            props:
                              href: '#'
                              style:
                                color: '#9ca3af'
                            content: Changelog

              # Resources column
              - type: container
                children:
                  - type: text
                    element: h4
                    props:
                      className: font-semibold mb-4
                    content: '$t:footer.resources'
                  - type: container
                    props:
                      className: space-y-2
                    children:
                      - type: container
                        children:
                          - type: link
                            props:
                              href: '#'
                              style:
                                color: '#9ca3af'
                            content: Documentation
                      - type: container
                        children:
                          - type: link
                            props:
                              href: '#'
                              style:
                                color: '#9ca3af'
                            content: Guides
                      - type: container
                        children:
                          - type: link
                            props:
                              href: '#'
                              style:
                                color: '#9ca3af'
                            content: API Reference

              # Company column
              - type: container
                children:
                  - type: text
                    element: h4
                    props:
                      className: font-semibold mb-4
                    content: '$t:footer.company'
                  - type: container
                    props:
                      className: space-y-2
                    children:
                      - type: container
                        children:
                          - type: link
                            props:
                              href: '#'
                              style:
                                color: '#9ca3af'
                            content: About
                      - type: container
                        children:
                          - type: link
                            props:
                              href: '#'
                              style:
                                color: '#9ca3af'
                            content: Blog
                      - type: container
                        children:
                          - type: link
                            props:
                              href: /contact
                              style:
                                color: '#9ca3af'
                            content: Contact

          # Copyright row
          - type: container
            props:
              style:
                display: flex
                justifyContent: space-between
                alignItems: center
                paddingTop: 2rem
                flexWrap: wrap
                gap: 1rem
            children:
              - type: text
                element: p
                props:
                  style:
                    color: '#9ca3af'
                content: '$t:footer.copyright'
              - type: text
                element: p
                props:
                  style:
                    color: '#9ca3af'
                content: '$t:footer.rights'
