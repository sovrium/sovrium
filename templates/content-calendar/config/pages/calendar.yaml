name: calendar
path: /
access:
  require: authenticated
  redirectTo: /sign-in
meta:
  title: Calendar
  description: The publishing month at a glance
components:
  - $ref: ./_nav.yaml
  - type: container
    element: section
    props:
      className: max-w-6xl mx-auto px-6 py-8
    children:
      - type: text
        element: h1
        props:
          className: text-2xl font-bold mb-1
        content: Calendar
      - type: text
        element: p
        props:
          className: text-sm mb-6
        content: Every piece with a publish date, laid out on the month. Consistency beats intensity.

      - type: calendar
        dataSource:
          table: content
        dateField: publish_date
        defaultView: month
