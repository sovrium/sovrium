name: directory
path: /
access:
  require: authenticated
  redirectTo: /sign-in
meta:
  title: Directory
  description: Everyone at the company, with photos and teams
components:
  - $ref: ./_nav.yaml
  - type: container
    element: section
    props:
      className: max-w-6xl mx-auto px-6 py-8
    children:
      - type: text
        element: h1
        props:
          className: text-2xl font-bold mb-1
        content: Directory
      - type: text
        element: p
        props:
          className: text-sm mb-6
        content: Everyone at the company. Salaries are field-permissioned — only admins can read them, enforced server-side.

      - type: gallery
        dataSource:
          table: employees
          sort:
            - field: name
              direction: asc
        gridColumns:
          mobile: 1
          sm: 2
          md: 3
          lg: 4
        galleryCard:
          coverImage: $record.photo
          children:
            - type: text
              element: h3
              props:
                className: text-sm font-semibold
              content: $record.name
            - type: text
              element: p
              props:
                className: text-xs
              content: $record.job_title
            - type: text
              element: p
              props:
                className: text-xs
              content: $record.department
