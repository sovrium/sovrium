id: 2
name: tags
# Public taxonomy. Editors and admins can curate the tag set.
permissions:
  read: all
  create:
    - admin
    - editor
  update:
    - admin
    - editor
  delete:
    - admin
fields:
  - id: 1
    name: name
    type: single-line-text
    required: true
  - id: 2
    name: slug
    type: single-line-text
    required: true
    unique: true
    indexed: true
