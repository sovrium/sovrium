name: post-detail
path: /blog/:slug
collection:
  table: posts
  slugField: slug
  filter:
    - field: status
      operator: eq
      value: published
meta:
  title: '$record.title'
  description: '$record.excerpt'
components:
  - type: container
    element: section
    props:
      className: bg-background py-16 px-6
    children:
      - type: container
        props:
          className: max-w-2xl mx-auto
        children:
          - type: link
            props:
              href: /
              className: text-sm mb-8 inline-block text-primary hover:underline
            content: ← Back to all posts

          - type: text
            element: h1
            props:
              className: text-4xl font-bold mb-6 text-foreground leading-tight tracking-tight
            content: '$record.title'

          - type: container
            props:
              className: flex items-center gap-3 mb-10 text-sm text-muted-foreground
            children:
              - type: text
                element: span
                content: 'By $record.author'
              - type: text
                element: span
                content: '·'
              - type: text
                element: span
                content: '$record.published_at'

          - type: container
            element: article
            props:
              className: prose prose-lg max-w-none text-foreground
            children:
              - type: text
                element: pre
                content: '$record.body'
