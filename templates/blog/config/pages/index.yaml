name: blog-index
path: /
meta:
  title: Blog
  description: Latest articles and writing
components:
  - type: container
    element: section
    props:
      className: bg-background py-16 px-6
    children:
      - type: container
        props:
          className: max-w-3xl mx-auto
        children:
          - type: text
            element: h1
            props:
              className: text-5xl font-bold mb-4 text-foreground tracking-tight
            content: Blog
          - type: text
            element: p
            props:
              className: text-lg mb-12 text-muted-foreground
            content: Thoughts, essays, and notes on building things.

          - type: data-table
            dataSource:
              table: posts
              filter:
                - field: status
                  operator: eq
                  value: published
              sort:
                - field: published_at
                  direction: desc
            columns:
              - field: title
                label: Title
              - field: published_at
                label: Published
              - field: author
                label: Author
              - field: tags
                label: Tags
            pagination:
              pageSize: 10
            emptyMessage: No published posts yet.
