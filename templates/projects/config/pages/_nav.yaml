# Reusable workspace top-nav. Included as a $ref array-item at the top of every
# workspace page's `components` list, so navigation stays defined in one place.
type: container
element: header
props:
  className: border-b
children:
  - type: container
    props:
      className: max-w-6xl mx-auto px-6 py-3 flex items-center justify-between
    children:
      - type: container
        props:
          className: flex items-center gap-6
        children:
          - type: text
            element: span
            props:
              className: text-base font-semibold
            content: Projects
          - type: container
            props:
              className: flex items-center gap-1 text-sm
            children:
              - type: link
                props:
                  href: /
                  className: px-3 py-1.5 rounded-md font-medium
                content: Dashboard
              - type: link
                props:
                  href: /board
                  className: px-3 py-1.5 rounded-md font-medium
                content: Board
              - type: link
                props:
                  href: /calendar
                  className: px-3 py-1.5 rounded-md font-medium
                content: Calendar
              - type: link
                props:
                  href: /timeline
                  className: px-3 py-1.5 rounded-md font-medium
                content: Timeline
      - type: button
        props:
          className: px-3 py-1.5 rounded-md border text-sm font-medium
        content: Sign out
        action:
          type: auth
          method: logout
          onSuccess:
            navigate: /sign-in
