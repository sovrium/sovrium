name: calendar
path: /calendar
access:
  require: authenticated
  redirectTo: /sign-in
meta:
  title: Calendar
  description: Task deadlines on a month view
components:
  - $ref: ./_nav.yaml
  - type: container
    element: section
    props:
      className: max-w-6xl mx-auto px-6 py-8
    children:
      - type: text
        element: h1
        props:
          className: text-2xl font-bold mb-1
        content: Calendar
      - type: text
        element: p
        props:
          className: text-sm mb-6
        content: Every task with a due date, laid out on the month.

      - type: calendar
        dataSource:
          table: tasks
        dateField: due_date
        defaultView: month
