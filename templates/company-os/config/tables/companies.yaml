id: 1
name: companies
fields:
  - id: 1
    name: name
    type: single-line-text
    required: true
  - id: 2
    name: industry
    type: single-select
    options:
      - Technology
      - Finance
      - Healthcare
      - Education
      - Retail
      - Other
  - id: 3
    name: website
    type: url
  - id: 4
    name: created_at
    type: created-at

aiAccess:
  description: >-
    Customer accounts. Use this when the user asks about organizations,
    clients, or accounts.
  operations:
    - read
    - list
    - create
    - update
  fieldExposure: permissioned

permissions:
  read: authenticated
  create:
    - admin
    - member
  update:
    - admin
    - member
  delete:
    - admin
